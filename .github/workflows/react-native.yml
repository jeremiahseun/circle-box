name: React Native Bridge

on:
  push:
    paths:
      - 'react-native/**'
      - 'samples/react-native-chaos-app/**'
      - '.github/workflows/react-native.yml'
  pull_request:
    paths:
      - 'react-native/**'
      - 'samples/react-native-chaos-app/**'
      - '.github/workflows/react-native.yml'

jobs:
  bridge-typecheck:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
    defaults:
      run:
        working-directory: react-native/circlebox-react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Typecheck
        run: npm run typecheck
      - name: Pack core tarball
        run: |
          mkdir -p ../../artifacts
          npm pack --pack-destination ../../artifacts
      - name: Upload core tarball
        uses: actions/upload-artifact@v4
        with:
          name: circlebox-react-native-core-package
          path: artifacts/*.tgz

  cloud-bridge-typecheck:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
    defaults:
      run:
        working-directory: react-native/circlebox-cloud-react-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Typecheck
        run: npm run typecheck
      - name: Pack cloud tarball
        run: |
          mkdir -p ../../artifacts
          npm pack --pack-destination ../../artifacts
      - name: Upload RN tarballs
        uses: actions/upload-artifact@v4
        with:
          name: circlebox-react-native-cloud-package
          path: artifacts/*.tgz

  sample-typecheck:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: development
    defaults:
      run:
        working-directory: samples/react-native-chaos-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm ci --include=dev
      - name: Typecheck
        run: npm run typecheck
