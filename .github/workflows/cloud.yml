name: Cloud Phase 3A

on:
  push:
    paths:
      - 'cloud/**'
      - 'ios/CircleBoxCloud/**'
      - 'android/circlebox-cloud/**'
      - 'flutter/circlebox_cloud_flutter/**'
      - 'react-native/circlebox-cloud-react-native/**'
      - '.github/workflows/cloud.yml'
  pull_request:
    paths:
      - 'cloud/**'
      - 'ios/CircleBoxCloud/**'
      - 'android/circlebox-cloud/**'
      - 'flutter/circlebox_cloud_flutter/**'
      - 'react-native/circlebox-cloud-react-native/**'
      - '.github/workflows/cloud.yml'

jobs:
  cloud-types:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Edge worker typecheck
        working-directory: cloud/circlebox-cloud/edge/worker
        run: |
          npm install
          npm run typecheck

      - name: Dashboard typecheck
        working-directory: cloud/dashboard
        run: |
          npm install
          npm run typecheck
          npm run check:links
          npm run build

      - name: RN cloud uploader typecheck
        working-directory: react-native/circlebox-cloud-react-native
        run: |
          npm install
          npm run typecheck

      - name: Worker ingest smoke (optional when secrets are set)
        if: ${{ secrets.CIRCLEBOX_WORKER_BASE_URL != '' && secrets.CIRCLEBOX_SMOKE_INGEST_KEY != '' }}
        run: |
          scripts/smoke_test_worker_ingest.sh \
            --base-url "${{ secrets.CIRCLEBOX_WORKER_BASE_URL }}" \
            --ingest-key "${{ secrets.CIRCLEBOX_SMOKE_INGEST_KEY }}" \
            --dashboard-token "${{ secrets.DASHBOARD_WORKER_TOKEN }}" \
            --skip-download-check

      - name: Worker usage/key-auth smoke (optional when control-plane secrets are set)
        if: ${{ secrets.CIRCLEBOX_WORKER_BASE_URL != '' && secrets.CIRCLEBOX_SMOKE_INGEST_KEY != '' && secrets.CONTROL_SUPABASE_URL != '' && secrets.CONTROL_SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: |
          scripts/smoke_test_worker_usage_telemetry.sh \
            --base-url "${{ secrets.CIRCLEBOX_WORKER_BASE_URL }}" \
            --ingest-key "${{ secrets.CIRCLEBOX_SMOKE_INGEST_KEY }}" \
            --control-url "${{ secrets.CONTROL_SUPABASE_URL }}" \
            --control-service-role "${{ secrets.CONTROL_SUPABASE_SERVICE_ROLE_KEY }}"

  ios-cloud:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: ios/CircleBoxCloud
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  android-cloud:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android/circlebox-cloud
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - name: Unit tests
        run: ../circlebox-sdk/gradlew --no-daemon -p . test

  flutter-cloud:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter/circlebox_cloud_flutter
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Pub get
        run: flutter pub get
      - name: Analyze
        run: flutter analyze
      - name: Test
        run: flutter test
