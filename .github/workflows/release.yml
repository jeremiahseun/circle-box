name: CircleBox Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Naming guard
        run: scripts/check_naming.sh
      - name: Release version map
        run: scripts/check_release_versions.sh 0.3.1
      - name: Schema parity fixtures
        run: scripts/check_schema_parity.py
      - name: CLI syntax check
        run: bash -n scripts/cli/circlebox.sh
      - name: Dashboard docs/type checks
        working-directory: cloud/dashboard
        run: |
          npm install
          npm run typecheck
          npm run check:links
          npm run build
      - name: Worker typecheck
        working-directory: cloud/circlebox-cloud/edge/worker
        run: |
          npm install
          npm run typecheck
      - name: Worker ingest smoke (optional when secrets are set)
        if: ${{ secrets.CIRCLEBOX_WORKER_BASE_URL != '' && secrets.CIRCLEBOX_SMOKE_INGEST_KEY != '' }}
        run: |
          scripts/smoke_test_worker_ingest.sh \
            --base-url "${{ secrets.CIRCLEBOX_WORKER_BASE_URL }}" \
            --ingest-key "${{ secrets.CIRCLEBOX_SMOKE_INGEST_KEY }}" \
            --dashboard-token "${{ secrets.DASHBOARD_WORKER_TOKEN }}"
      - name: Worker usage/key-auth smoke (optional when control-plane secrets are set)
        if: ${{ secrets.CIRCLEBOX_WORKER_BASE_URL != '' && secrets.CIRCLEBOX_SMOKE_INGEST_KEY != '' && secrets.CONTROL_SUPABASE_URL != '' && secrets.CONTROL_SUPABASE_SERVICE_ROLE_KEY != '' }}
        run: |
          scripts/smoke_test_worker_usage_telemetry.sh \
            --base-url "${{ secrets.CIRCLEBOX_WORKER_BASE_URL }}" \
            --ingest-key "${{ secrets.CIRCLEBOX_SMOKE_INGEST_KEY }}" \
            --control-url "${{ secrets.CONTROL_SUPABASE_URL }}" \
            --control-service-role "${{ secrets.CONTROL_SUPABASE_SERVICE_ROLE_KEY }}"

  ios-assets:
    runs-on: macos-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - name: Test iOS SDK
        working-directory: ios/CircleBoxSDK
        run: |
          swift build
          swift test
      - name: Test iOS Cloud
        working-directory: ios/CircleBoxCloud
        run: |
          swift build
          swift test
      - name: Package iOS source artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/CircleBoxSDK-swiftpm-source.tgz ios/CircleBoxSDK
          tar -czf artifacts/CircleBoxCloud-swiftpm-source.tgz ios/CircleBoxCloud
          tar -czf artifacts/CircleBoxIntegrations-swiftpm-source.tgz integrations/ios/CircleBoxIntegrations
      - name: Upload iOS assets
        uses: actions/upload-artifact@v4
        with:
          name: release-ios-assets
          path: artifacts/*

  android-assets:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v3
      - name: Build Android SDK AAR
        working-directory: android/circlebox-sdk
        run: |
          ./gradlew --no-daemon test assembleRelease
      - name: Build Android Cloud AAR
        working-directory: android/circlebox-cloud
        run: |
          ./gradlew --no-daemon test assembleRelease
      - name: Collect Android artifacts
        run: |
          mkdir -p artifacts
          cp android/circlebox-sdk/build/outputs/aar/*.aar artifacts/
          cp android/circlebox-cloud/build/outputs/aar/*.aar artifacts/
      - name: Upload Android assets
        uses: actions/upload-artifact@v4
        with:
          name: release-android-assets
          path: artifacts/*

  flutter-assets:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Validate Flutter packages
        run: |
          cd flutter/circlebox_flutter
          flutter pub get
          flutter analyze
          flutter test
          cd ../circlebox_cloud_flutter
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            circlebox_flutter:
              path: ../circlebox_flutter
          EOF
          flutter pub get
          flutter analyze
          flutter test
          rm -f pubspec_overrides.yaml
          cd ../circlebox_adapters
          cat > pubspec_overrides.yaml <<'EOF'
          dependency_overrides:
            circlebox_flutter:
              path: ../circlebox_flutter
          EOF
          flutter pub get
          flutter analyze
          flutter test
          rm -f pubspec_overrides.yaml
      - name: Package Flutter artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/circlebox_flutter.tgz flutter/circlebox_flutter
          tar -czf artifacts/circlebox_cloud_flutter.tgz flutter/circlebox_cloud_flutter
          tar -czf artifacts/circlebox_adapters.tgz flutter/circlebox_adapters
      - name: Upload Flutter assets
        uses: actions/upload-artifact@v4
        with:
          name: release-flutter-assets
          path: artifacts/*

  react-native-assets:
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Pack RN core package
        working-directory: react-native/circlebox-react-native
        run: |
          npm ci --include=dev
          npm run typecheck
          npm pack --pack-destination ../../artifacts
      - name: Pack RN cloud package
        working-directory: react-native/circlebox-cloud-react-native
        run: |
          npm ci --include=dev
          npm run typecheck
          npm pack --pack-destination ../../artifacts
      - name: Upload RN assets
        uses: actions/upload-artifact@v4
        with:
          name: release-react-native-assets
          path: artifacts/*

  release-manifest:
    runs-on: ubuntu-latest
    needs: [ios-assets, android-assets, flutter-assets, react-native-assets]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate checksums and manifest
        run: |
          cd release-assets
          sha256sum * > checksums.txt
          printf '{\n  "tag": "%s",\n  "assets": [\n' "${GITHUB_REF_NAME}" > release-manifest.json
          ls -1 | awk 'BEGIN { first=1 } { if ($0 != "release-manifest.json") { if (!first) { printf(",\n") } printf("    \"%s\"", $0); first=0 } } END { printf "\n  ]\n}\n" }' >> release-manifest.json
      - name: Upload release package
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: release-assets/*

  publish-release:
    runs-on: ubuntu-latest
    needs: release-manifest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release-assets
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
